# ============================================================================
# AI Meeting Agent — lab-intelligence stack (self-hosted, DGX Spark)
# ----------------------------------------------------------------------------
# OUR services: WhisperX ASR, minutes LLM, diarize, meeting-agent-server.
# Transcription always runs HERE (import / pipeline) — never via Vexa live STT.
#
# Vexa (bot join + record → MinIO) is optional. Bring it up with the bots overlay:
#   docker compose -f deploy/docker-compose.yml \
#     -f deploy/docker-compose.bots.yml --env-file deploy/.env up -d
# See deploy/README.md.
#
# GPU: whisperx / minutes-llm / diarize request the DGX GPU. On a non-GPU host,
# drop the deploy.resources.reservations.devices blocks (CPU fallback, slow).
# DGX Spark is aarch64 — pin arm64-capable images / build multi-arch.
# ============================================================================

name: meeting-agent

services:
  # -------------------------------------------------------------------------
  # DGX model service 1 — WhisperX ASR (OpenAI-compatible)
  # Used only by meeting-agent-server (post-capture import pipeline).
  # Vexa is configured record-only and does NOT call this service.
  # -------------------------------------------------------------------------
  whisperx:
    image: ${WHISPERX_IMAGE:-ghcr.io/speaches-ai/speaches:latest-cuda}
    environment:
      - WHISPER__MODEL=${ASR_MODEL:-Systran/faster-whisper-large-v3}
      - WHISPER__COMPUTE_TYPE=${ASR_COMPUTE_TYPE:-float16}
      - WHISPER__INFERENCE_DEVICE=cuda
    ports:
      - "${WHISPERX_HOST_PORT:-8010}:8000"
    volumes:
      - whisperx-models:/home/ubuntu/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks: [vexa, meeting-agent]
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # DGX model service 2 — Minutes / action-item LLM (OpenAI-compatible)
  # -------------------------------------------------------------------------
  minutes-llm:
    image: ${LLM_IMAGE:-ollama/ollama:latest}
    environment:
      - OLLAMA_KEEP_ALIVE=${LLM_KEEP_ALIVE:-30m}
    ports:
      - "${LLM_HOST_PORT:-11434}:11434"
    volumes:
      - llm-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks: [meeting-agent]
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # DGX model service 3 — Diarization (speaker identification)
  # -------------------------------------------------------------------------
  diarize-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.diarize
    image: ${DIARIZE_IMAGE:-ghcr.io/bmw-ece-ntust/ai-meeting-agent/meeting-agent-diarize-service:latest}
    environment:
      - DIARIZE_HOST=0.0.0.0
      - DIARIZE_PORT=8001
      - DIARIZE_EXECUTION_MODE=${DIARIZE_EXECUTION_MODE:-cuda-fast}
      - DIARIZE_MODEL_DIR=${DIARIZE_MODEL_DIR:-}
      - DIARIZE_EMBEDDING_MODEL=${DIARIZE_EMBEDDING_MODEL:-wespeaker-voxceleb-CAM++_LM}
      - DIARIZE_EMBEDDING_DIM=${DIARIZE_EMBEDDING_DIM:-512}
      - HOME=/app
      - HF_HOME=/app/.cache/huggingface
      - RUST_LOG=${DIARIZE_LOG_LEVEL:-info}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    ports:
      - "${DIARIZE_HOST_PORT:-8001}:8001"
    volumes:
      - diarize-models:/app/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks: [meeting-agent]
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # meeting-agent HTTP API + storage (Rust, this repo).
  # Import path owns transcription (WhisperX) + optional diarize + summaries.
  # -------------------------------------------------------------------------
  meeting-agent-server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
    image: ${SERVER_IMAGE:-ghcr.io/bmw-ece-ntust/ai-meeting-agent/meeting-agent-server:latest}
    environment:
      - MEETING_AGENT_HOST=0.0.0.0
      - MEETING_AGENT_PORT=8080
      - TRANSCRIPTION_PROVIDER=openai
      - TRANSCRIPTION_BASE_URL=http://whisperx:8000/v1
      - TRANSCRIPTION_MODEL=${ASR_MODEL:-Systran/faster-whisper-large-v3}
      - TRANSCRIPTION_API_KEY=${TRANSCRIPTION_API_KEY:-not-needed-local}
      - SUMMARY_PROVIDER=openai
      - SUMMARY_BASE_URL=http://minutes-llm:11434/v1
      - SUMMARY_MODEL=${LLM_MODEL:-qwen2.5:32b}
      - SUMMARY_API_KEY=${SUMMARY_API_KEY:-not-needed-local}
      - DIARIZE_ENABLED=${DIARIZE_ENABLED:-false}
      - DIARIZE_SERVICE_URL=${DIARIZE_SERVICE_URL:-http://diarize-service:8001}
      - DIARIZE_EXECUTION_MODE=${DIARIZE_EXECUTION_MODE:-auto}
      - DIARIZE_EMBEDDING_MODEL=${DIARIZE_EMBEDDING_MODEL:-wespeaker-voxceleb-CAM++_LM}
      - DIARIZE_EMBEDDING_DIM=${DIARIZE_EMBEDDING_DIM:-512}
    ports:
      - "${SERVER_HOST_PORT:-8080}:8080"
    volumes:
      - meeting-data:/root/.meeting-agent
    networks: [meeting-agent, vexa]
    depends_on: [whisperx, minutes-llm, diarize-service]
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Orchestrator — post-meeting glue (Phase 3-4, NOT YET IMPLEMENTED).
  # Will: POST Vexa /bots → on meeting end pull MinIO recording → import into
  # meeting-agent (ASR here) → identify + SOP minutes → daily-log + GCal.
  # -------------------------------------------------------------------------
  # orchestrator:
  #   build:
  #     context: ..
  #     dockerfile: services/orchestrator/Dockerfile
  #   environment:
  #     - VEXA_API_BASE=http://gateway:8000
  #     - VEXA_API_KEY=${VEXA_API_KEY}
  #     - MEETING_AGENT_URL=http://meeting-agent-server:8080
  #     - GOOGLE_CALENDAR_CREDENTIALS=/secrets/gcal.json
  #     - DAILY_LOG_TARGET=${DAILY_LOG_TARGET}
  #   networks: [vexa, meeting-agent]
  #   depends_on: [meeting-agent-server]
  #   restart: unless-stopped

networks:
  # Shared with Vexa when docker-compose.bots.yml is merged (include).
  # Lab-only up creates this network; no prior `make all` required.
  vexa:
    driver: bridge
  meeting-agent:
    driver: bridge

volumes:
  whisperx-models:
  llm-models:
  diarize-models:
  meeting-data:
