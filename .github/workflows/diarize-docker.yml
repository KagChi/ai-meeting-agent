name: diarize-docker

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}/diarize-server

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: tags
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          REF="${GITHUB_REF#refs/}"
          if [[ "$REF" == tags/* ]]; then
            VER="${REF#tags/}"
            echo "tags=${{ env.IMAGE }}:${VER},${{ env.IMAGE }}:latest,${{ env.IMAGE }}:sha-${SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${{ env.IMAGE }}:latest,${{ env.IMAGE }}:sha-${SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.diarize
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=diarize-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=diarize-${{ matrix.platform }}
          provenance: false

  manifest:
    name: Merge multi-arch manifest
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          REF="${GITHUB_REF#refs/}"
          if [[ "$REF" == tags/* ]]; then
            VER="${REF#tags/}"
            TAGS="$VER latest sha-$SHA"
          else
            TAGS="latest sha-$SHA"
          fi
          for T in $TAGS; do
            docker buildx imagetools create -t ${{ env.IMAGE }}:$T \
              ${{ env.IMAGE }}:sha-$SHA
          done
