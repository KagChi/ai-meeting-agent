name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build CLI
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: meeting-agent
            asset_name: meeting-agent-linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: meeting-agent
            asset_name: meeting-agent-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: meeting-agent
            asset_name: meeting-agent-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: meeting-agent.exe
            asset_name: meeting-agent-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin meeting-agent

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  build-diarize:
    name: Build diarize-server
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: diarize-server-linux-amd64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            archive: diarize-server-linux-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y g++ pkg-config

      - uses: Swatinem/rust-cache@v2
        with:
          key: diarize-${{ matrix.target }}

      - name: Build diarize-server
        run: cargo build --release --target ${{ matrix.target }} --bin diarize-server

      - name: Stage artifacts
        run: |
          mkdir -p ${{ matrix.archive }}
          cp target/${{ matrix.target }}/release/diarize-server ${{ matrix.archive }}/
          cp .github/scripts/diarize-run.sh ${{ matrix.archive }}/run.sh
          chmod +x ${{ matrix.archive }}/run.sh

      - name: Tarball
        run: tar czf ${{ matrix.archive }}.tar.gz ${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}.tar.gz

  release:
    name: Release
    needs: [build, build-diarize]
    runs-on: ubuntu-latest
    # allow release to proceed even if diarize build is skipped (workflow_dispatch on non-tag)
    if: always() && needs.build.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
