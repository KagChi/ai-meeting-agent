name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # See ci.yml + AGENTS.md "ONNX Runtime Version Sync" for rationale.
  ORT_VERSION: "1.24.2"

jobs:
  build:
    name: Build CLI
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: meeting-agent
            asset_name: meeting-agent-linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: meeting-agent
            asset_name: meeting-agent-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: meeting-agent
            asset_name: meeting-agent-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: meeting-agent.exe
            asset_name: meeting-agent-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install ONNX Runtime (Linux only)
        if: runner.os == 'Linux'
        run: |
          curl -sL "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION}.tgz" | tar xz -C /tmp
          echo "ORT_LIB_LOCATION=/tmp/onnxruntime-linux-x64-${ORT_VERSION}/lib" >> "$GITHUB_ENV"
          echo "ORT_PREFER_DYNAMIC_LINK=1" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=/tmp/onnxruntime-linux-x64-${ORT_VERSION}/lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin meeting-agent

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  release:
    name: Release
    needs: [build]
    runs-on: ubuntu-latest
    if: always() && needs.build.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
