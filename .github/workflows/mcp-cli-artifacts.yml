name: MCP CLI Artifacts

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build MCP CLI
    runs-on: ubuntu-latest 
    strategy:
      matrix:
        include:
          - os: ubuntu-latest 
            target: x86_64-unknown-linux-gnu
            suffix: linux-amd64
            ext: ''
          - os: ubuntu-latest 
            target: aarch64-unknown-linux-gnu
            suffix: linux-arm64
            ext: ''
          - os: ubuntu-latest 
            target: aarch64-apple-darwin
            suffix: macos-arm64
            ext: ''
          - os: ubuntu-latest 
            target: x86_64-pc-windows-gnu
            suffix: windows-amd64
            ext: '.exe'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      # Prior multiarch experiments left arm64 foreign arch pointing at
      # archive.ubuntu.com (amd64-only) → apt 404. Strip before any apt use.
      - name: Fix apt architectures
        run: |
          for arch in $(dpkg --print-foreign-architectures); do
            sudo dpkg --remove-architecture "$arch" || true
          done
          sudo apt-get update

      - name: Install MinGW (For Windows)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Configure Cargo Linker (For Windows)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          mkdir -p .cargo
          echo '[target.x86_64-pc-windows-gnu]' >> .cargo/config.toml
          echo 'linker = "x86_64-w64-mingw32-gcc"' >> .cargo/config.toml

      - name: Install AArch64 GCC (For Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu perl make

      - name: Configure Cargo Linker (For Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml

      - name: Install Zig (For macOS)
        if: contains(matrix.target, 'apple')
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        if: contains(matrix.target, 'apple')
        run: cargo install cargo-zigbuild --locked

      # cargo-zigbuild on Linux needs a real MacOSX.sdk to link Security/System frameworks
      - name: Cache MacOSX SDK
        if: contains(matrix.target, 'apple')
        uses: actions/cache@v4
        id: macosx-sdk-cache
        with:
          path: /opt/macosx-sdks
          key: macosx-sdk-26.1

      - name: Install MacOSX SDK (For macOS cross-link)
        if: contains(matrix.target, 'apple') && steps.macosx-sdk-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get install -y xz-utils
          SDK_VERSION=26.1
          curl -fsSL "https://github.com/joseluisq/macosx-sdks/releases/download/${SDK_VERSION}/MacOSX${SDK_VERSION}.sdk.tar.xz" \
            -o /tmp/MacOSX.sdk.tar.xz
          sudo mkdir -p /opt/macosx-sdks
          sudo tar -xJf /tmp/MacOSX.sdk.tar.xz -C /opt/macosx-sdks

      - name: Set SDKROOT for macOS builds
        if: contains(matrix.target, 'apple')
        run: echo "SDKROOT=/opt/macosx-sdks/MacOSX26.1.sdk" >> "$GITHUB_ENV"

      - name: Build (Native Linux, Linux ARM64, & Windows)
        if: "!contains(matrix.target, 'apple')"
        run: cargo build --release --target ${{ matrix.target }} --bin meeting-agent-mcp

      - name: Build (macOS via Zig)
        if: contains(matrix.target, 'apple')
        env:
          SDKROOT: ${{ env.SDKROOT }}
        run: |
          # Repo .cargo/config.toml has host-only homebrew gfortran/Accelerate flags;
          # strip them when cross-compiling from Linux.
          mkdir -p .cargo
          printf '%s\n' '[target.aarch64-apple-darwin]' > .cargo/config.toml
          cargo zigbuild --release --target ${{ matrix.target }} --bin meeting-agent-mcp

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/meeting-agent-mcp${{ matrix.ext }}" "dist/meeting-agent-mcp-${{ matrix.suffix }}${{ matrix.ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: meeting-agent-mcp-${{ matrix.suffix }}
          path: dist/*
