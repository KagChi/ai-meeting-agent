name: MCP CLI Artifacts

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build MCP CLI
    runs-on: self-hosted 
    strategy:
      matrix:
        include:
          - os: ubuntu-latest 
            target: x86_64-unknown-linux-gnu
            suffix: linux-amd64
            ext: ''
          - os: ubuntu-latest 
            target: aarch64-unknown-linux-gnu
            suffix: linux-arm64
            ext: ''
          - os: ubuntu-latest 
            target: x86_64-apple-darwin
            suffix: macos-amd64
            ext: ''
          - os: ubuntu-latest 
            target: aarch64-apple-darwin
            suffix: macos-arm64
            ext: ''
          - os: ubuntu-latest 
            target: x86_64-pc-windows-gnu
            suffix: windows-amd64
            ext: '.exe'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install MinGW (For Windows)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Configure Cargo Linker (For Windows)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          mkdir -p .cargo
          echo '[target.x86_64-pc-windows-gnu]' >> .cargo/config.toml
          echo 'linker = "x86_64-w64-mingw32-gcc"' >> .cargo/config.toml

      - name: Install AArch64 GCC (For Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure Cargo Linker (For Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml

      - name: Install Zig (For macOS)
        if: contains(matrix.target, 'apple')
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.11.0

      - name: Install cargo-zigbuild
        if: contains(matrix.target, 'apple')
        run: cargo install cargo-zigbuild

      - name: Build (Native Linux, Linux ARM64, & Windows)
        if: "!contains(matrix.target, 'apple')"
        run: cargo build --release --target ${{ matrix.target }} --bin meeting-agent-mcp

      - name: Build (macOS via Zig)
        if: contains(matrix.target, 'apple')
        run: cargo zigbuild --release --target ${{ matrix.target }} --bin meeting-agent-mcp

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/meeting-agent-mcp${{ matrix.ext }}" "dist/meeting-agent-mcp-${{ matrix.suffix }}${matrix.ext}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: meeting-agent-mcp-${{ matrix.suffix }}
          path: dist/*